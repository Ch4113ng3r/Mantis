id: PASSWORD_RESET
name: Password Reset Flaws — Comprehensive
cwe:
- CWE-640
owasp: A07:2021 Identification and Authentication Failures
severity_range: High - Critical
description: Password reset flows have many failure modes leading to account takeover. Token predictability, host header poisoning,
  response manipulation, and reset link interception.
detection:
  attack_classes:
    host_header_poisoning:
      description: Reset link generated using Host header. Spoof header to send link to attacker domain.
      exploitation:
      - 'POST /reset with Host: attacker.com'
      - Victim gets email with link https://attacker.com/reset?token=...
      - Victim clicks, attacker captures token
      severity: critical
    predictable_tokens:
      description: Reset tokens based on timestamp, sequence, or weak entropy
      test: Request multiple resets, check token patterns
      severity: critical
    token_no_expiry:
      description: Old tokens remain valid forever
      severity: high
    token_reusable:
      description: Token works multiple times
      severity: high
    user_enumeration_via_response:
      description: Different response for valid vs invalid email
      severity: low
    race_condition:
      description: Generate two tokens at same time, both valid
      severity: medium
    leak_via_response:
      description: Reset token returned in API response (not just email)
      severity: critical
    self_password_change_without_old:
      description: Logged-in change password doesn't require current password (CSRF target)
      severity: high
    ip_session_binding:
      description: Token works from any IP/session (should bind to requestor)
      severity: medium
    weak_security_questions:
      description: Secondary auth via guessable questions
      severity: medium
exploitation:
  host_header_attack:
  - '1. Request password reset with Host: attacker.com'
  - '2. Or with X-Forwarded-Host: attacker.com'
  - 3. Email arrives with link to attacker domain
  - 4. Capture token when victim clicks
  - 5. Use token at the real domain to reset password
  predictable_token_attack:
  - 1. Request reset for attacker account, capture token
  - '2. Analyze token: timestamp? counter? short random?'
  - 3. Request reset for victim, predict their token
  - 4. Use predicted token before victim sees email
ai_research_hints:
- 'Check ALL Host header variants: Host, X-Forwarded-Host, X-Host, Forwarded'
- Test if reset link works after victim has logged in
- Check if changing password invalidates other sessions (it should)
- 'Two-stage flows: email link → security question — both can fail'
- Mobile API and web API often have separate reset flows with different security
references:
- https://book.hacktricks.xyz/pentesting-web/reset-password
- https://www.acunetix.com/blog/articles/password-reset-poisoning/
