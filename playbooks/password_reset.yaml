id: PASSWORD_RESET
name: Password Reset Vulnerabilities
cwe:
- CWE-640
owasp: A07:2021 Identification and Authentication Failures
severity_range: Medium - Critical
description: Flaws in password reset flows allowing account takeover.
detection:
  strategy:
  - 1. Request password reset — analyze the reset link/token
  - 2. Check if token is predictable (sequential, timestamp-based)
  - 3. Test if token expires (use after long delay)
  - 4. Test if token is single-use (reuse after password change)
  - 5. Test Host header injection for reset link poisoning
  - 6. Check if reset leaks user existence (different response for valid/invalid email)
  - 7. Test rate limiting on reset requests
  - 8. Check if the reset flow can be used for user enumeration
  - 9. Test if changing email + requesting reset = account takeover
evidence_needed: Predictable reset token, host header poisoning in reset link, or token reuse after expiry
references:
- https://cheatsheetseries.owasp.org/cheatsheets/Forgot_Password_Cheat_Sheet.html
